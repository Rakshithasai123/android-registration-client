name: ARC Build With Pre-Checks

on:
  workflow_dispatch:
    inputs:
      serverBaseURL:
        description: "Enter Server Base URL"
        required: true
        default: "api-internal.sandbox.xyz.net"

jobs:

  dco-check:
    name: DCO Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate DCO
        uses: docker://ghcr.io/viperproject/dco-check:latest
        with:
          args: "--signoff"

  codeql:
    name: CodeQL Security Scan
    runs-on: ubuntu-latest
    needs: dco-check
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java

      - name: Build for CodeQL (Android)
        run: |
          cd client
          chmod +x gradlew
          ./gradlew compileDebugSources || true

      - name: Run CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  prebuild:
    name: Pre-Build Validation
    runs-on: ubuntu-latest
    needs: codeql
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Gradle Build (no tests)
        run: |
          cd client
          chmod +x gradlew
          ./gradlew clean assembleDebug --dry-run

  build-apk:
    name: Build APK
    runs-on: ubuntu-latest
    needs: prebuild

    steps:
      - uses: actions/checkout@v4

      - name: Install npm dependencies
        run: npm install

      - name: Replace serverBaseURL
        run: |
          find . -type f -name "*build.gradle" -print0 | \
          xargs -0 sed -i "s|api-internal.sandbox.xyz.net|${{ github.event.inputs.serverBaseURL }}|g"

      - name: Build APK
        run: |
          cd client
          chmod +x gradlew
          ./gradlew assembleDebug
          ls app/build/outputs/apk/debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: arc-apk
          path: client/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 5
